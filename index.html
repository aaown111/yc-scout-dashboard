<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YC Scout Dashboard — 2026-04-06</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#f8fafc; --surface:#fff; --border:#e2e8f0;
  --text:#1e293b; --muted:#64748b; --faint:#94a3b8;
  --primary:#2563eb; --success:#16a34a; --warn:#d97706; --danger:#dc2626;
  --micro:#f59e0b; --purple:#7c3aed;
  --r:12px; --rsm:8px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh-lg:0 10px 30px rgba(0,0,0,.13);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal','Segoe UI',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}

/* ── Header ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;position:sticky;top:0;z-index:100}
.hdr-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:20px}
.logo{font-size:20px;font-weight:900}.logo span{color:var(--primary)}
.hstats{display:flex;gap:20px;margin-right:auto}
.hs{text-align:center}
.hs-n{font-size:18px;font-weight:800;line-height:1}
.hs-l{font-size:10px;color:var(--muted);margin-top:2px}
.scan-lbl{font-size:11px;color:var(--faint);white-space:nowrap}

/* ── Tabs nav ── */
.tabs-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:57px;z-index:99}
.tabs-inner{max-width:1400px;margin:0 auto;display:flex;overflow-x:auto}
.tab-btn{padding:13px 18px;font-size:13px;font-weight:600;font-family:'Tajawal',sans-serif;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ── Layout ── */
.main{max-width:1400px;margin:0 auto;padding:20px 24px}

/* ── Sectors 3-level layout ── */
.sec-layout{display:grid;grid-template-columns:210px 1fr;gap:18px;align-items:start}
.sec-sidebar{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);position:sticky;top:116px;overflow:hidden}
.sidebar-hd{padding:11px 14px;font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
.sec-pill{display:flex;align-items:center;gap:9px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;transition:background .1s}
.sec-pill:last-child{border-bottom:none}
.sec-pill:hover{background:var(--bg)}
.sec-pill.active{background:#eff6ff;color:var(--primary);font-weight:700}
.sec-pill .pc{margin-right:auto;font-size:10px;background:var(--border);border-radius:10px;padding:1px 7px}
.sec-pill.active .pc{background:#bfdbfe;color:var(--primary)}

/* ── Toolbar (search + filters) ── */
.toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.search-inp{flex:1;min-width:180px;padding:9px 14px;border-radius:var(--rsm);border:1px solid var(--border);font-size:13px;font-family:'Tajawal',sans-serif;background:var(--surface);direction:rtl}
.search-inp:focus{outline:2px solid var(--primary);border-color:transparent}
.flt-btn{padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .1s}
.flt-btn:hover{background:var(--bg)}
.flt-btn.fa{background:var(--success);color:#fff;border-color:var(--success)}
.flt-btn.fw{background:var(--warn);color:#fff;border-color:var(--warn)}
.flt-btn.fd{background:var(--danger);color:#fff;border-color:var(--danger)}
.flt-btn.fp{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ── Sector overview grid ── */
.sec-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.sec-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:18px;cursor:pointer;transition:box-shadow .15s,transform .15s}
.sec-card:hover{box-shadow:var(--sh-lg);transform:translateY(-2px)}
.sc-icon{font-size:28px;margin-bottom:8px}
.sc-name{font-size:15px;font-weight:800;margin-bottom:2px}
.sc-en{font-size:11px;color:var(--muted);margin-bottom:10px}
.sc-stats{display:flex;gap:18px}
.sc-sn{font-size:20px;font-weight:800}.sc-sl{font-size:10px;color:var(--muted)}
.sc-signal{display:inline-block;margin-top:10px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px}

/* ── Opportunity cards ── */
.opp-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);border-right:4px solid var(--primary);padding:14px 18px;margin-bottom:10px;cursor:pointer;display:flex;gap:14px;align-items:flex-start;transition:box-shadow .15s,transform .12s}
.opp-card:hover{box-shadow:var(--sh-lg);transform:translateY(-1px)}
.opp-card.bm{border-right-color:var(--micro)}
.opp-body{flex:1;min-width:0}
.opp-name{font-size:14px;font-weight:700;margin-bottom:3px}
.opp-meta{font-size:11px;color:var(--muted);margin-bottom:6px}
.opp-desc{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.opp-footer{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.sr-wrap{flex-shrink:0}
.bm-btn{width:30px;height:30px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.bm-btn:hover,.bm-btn.on{background:#fffbeb;border-color:var(--micro)}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bg{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.by{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.br{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.bb{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.bp{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
.bo{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}

/* ── Detail panel ── */
.det-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none}
.det-ov.open{display:block}
.det-panel{position:fixed;top:0;left:0;width:680px;max-width:96vw;height:100vh;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:201;transform:translateX(-100%);transition:transform .25s ease}
.det-panel.open{transform:translateX(0)}
.det-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;position:sticky;top:0;background:var(--surface);z-index:1}
.det-close{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:auto;transition:background .1s}
.det-close:hover{background:var(--border)}
.det-body{padding:22px}
.det-sec{margin-bottom:22px}
.det-sec-title{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}

/* ── Score breakdown ── */
.sbr{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:12px}
.sbr-lbl{flex:1;color:var(--muted)}
.sbr-bar{width:90px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.sbr-fill{height:100%;border-radius:3px;background:var(--primary)}
.sbr-sc{font-weight:700;min-width:36px;text-align:center;font-size:12px}

/* ── TAM / SAM / SOM ── */
.tsm{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tsm-c{background:var(--bg);border-radius:var(--rsm);padding:12px;text-align:center;border:1px solid var(--border)}
.tsm-l{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:3px}
.tsm-v{font-size:13px;font-weight:800}

/* ── Unit economics ── */
.ue{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.ue-c{background:var(--bg);border-radius:var(--rsm);padding:11px;border:1px solid var(--border)}
.ue-l{font-size:10px;color:var(--muted);margin-bottom:2px}
.ue-v{font-size:14px;font-weight:800}

/* ── Financial projections ── */
.fp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.fp-tbl th{background:var(--bg);padding:7px 9px;text-align:center;font-weight:700;color:var(--muted);border:1px solid var(--border)}
.fp-tbl td{padding:7px 9px;text-align:center;border:1px solid var(--border)}
.fp-tbl tr:hover td{background:var(--bg)}

/* ── Risk analysis ── */
.risk-row{background:var(--bg);border-radius:var(--rsm);padding:11px 14px;margin-bottom:7px;border:1px solid var(--border)}
.rr-hdr{display:flex;gap:7px;align-items:center;margin-bottom:5px}
.rr-name{font-weight:600;font-size:12px;flex:1}
.rr-mit{font-size:11px;color:var(--muted)}

/* ── Roadmap ── */
.rm-phase{display:flex;gap:14px;margin-bottom:14px}
.rm-dot{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.rm-body{flex:1}
.rm-name{font-weight:700;font-size:12px}
.rm-dur{font-size:10px;color:var(--muted);margin-bottom:4px}
.rm-task{font-size:11px;color:var(--muted)}
.rm-task::before{content:'• '}

/* ── Indicators ── */
.ind-row{display:flex;gap:10px;align-items:center;padding:7px 11px;border-radius:var(--rsm);background:var(--bg);margin-bottom:5px;font-size:12px}
.ind-pos{color:var(--success);font-weight:700}
.ind-gap{color:var(--warn);font-weight:700}
.ind-neg{color:var(--danger);font-weight:700}

/* ── Economy tab ── */
.mac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:11px;margin-bottom:22px}
.mac-c{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1px solid #bbf7d0;border-radius:var(--r);padding:14px}
.mac-l{font-size:10px;color:#166534;font-weight:700;margin-bottom:3px}
.mac-v{font-size:19px;font-weight:800;color:#15803d}
.mac-m{font-size:10px;color:#4ade80;margin-top:1px}
.sec-ctx-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);border-right:4px solid var(--primary);padding:14px 18px;margin-bottom:10px}
.scc-name{font-size:13px;font-weight:700;margin-bottom:5px}
.scc-text{font-size:12px;color:var(--muted);line-height:1.8}

/* ── Charts tab ── */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:18px}
.ch-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:18px}
.ch-title{font-size:13px;font-weight:700;margin-bottom:14px}

/* ── Risk Matrix tab ── */
.matrix-wrap{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:20px}
.matrix-title{font-size:14px;font-weight:700;margin-bottom:16px}
.matrix-labels{display:flex;gap:4px;margin-bottom:4px;margin-right:48px}
.matrix-lbl{flex:1;text-align:center;font-size:10px;font-weight:600;color:var(--muted)}
.matrix-rows{display:flex;flex-direction:column;gap:4px}
.matrix-row{display:flex;gap:4px;align-items:stretch}
.matrix-row-lbl{width:64px;min-width:64px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--muted);writing-mode:vertical-rl;text-align:center;flex-shrink:0;overflow:visible}
.matrix-cell{flex:1;min-height:80px;border-radius:6px;border:1px solid var(--border);padding:5px;overflow:hidden}
.mc-00{background:#fff1f2}.mc-01{background:#fff7ed}.mc-02{background:#fffbeb}.mc-03{background:#f0fdf4}.mc-04{background:#f0fdf4}
.mc-10{background:#fff1f2}.mc-11{background:#fff7ed}.mc-12{background:#fffbeb}.mc-13{background:#fffbeb}.mc-14{background:#f0fdf4}
.mc-20{background:#fef2f2}.mc-21{background:#fff1f2}.mc-22{background:#fffbeb}.mc-23{background:#fffbeb}.mc-24{background:#fffbeb}
.mc-30{background:#fef2f2}.mc-31{background:#fef2f2}.mc-32{background:#fff1f2}.mc-33{background:#fffbeb}.mc-34{background:#fffbeb}
.mc-40{background:#fef2f2}.mc-41{background:#fef2f2}.mc-42{background:#fef2f2}.mc-43{background:#fff1f2}.mc-44{background:#fffbeb}
.mat-chip{font-size:9px;padding:2px 5px;border-radius:4px;background:var(--primary);color:#fff;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:normal;word-break:break-word;cursor:pointer;transition:opacity .1s}
.mat-chip:hover{opacity:.8}
.matrix-legend{display:flex;gap:16px;margin-top:14px;font-size:11px;align-items:center;flex-wrap:wrap}
.ml-item{display:flex;align-items:center;gap:5px}
.ml-box{width:12px;height:12px;border-radius:3px}

/* ── Micro tab ── */
.micro-sub-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.mst-btn{padding:8px 15px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .1s}
.mst-btn.active{background:var(--micro);color:#fff;border-color:var(--micro)}
.micro-card{background:#fffbeb;border-radius:var(--r);border:1px solid #fde68a;border-right:4px solid var(--micro);padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s}
.micro-card:hover{box-shadow:var(--sh-lg)}
.mc-name{font-size:14px;font-weight:700;color:#92400e;margin-bottom:3px}
.mc-meta{font-size:11px;color:#b45309;margin-bottom:7px}
.mc-stats{display:flex;gap:14px;flex-wrap:wrap;font-size:12px}

/* ── Feasibility Calculator ── */
.calc-panel{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:22px;margin-bottom:18px}
.calc-panel h3{font-size:14px;font-weight:700;margin-bottom:14px}
.calc-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:18px}
.cf label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px}
.cf input[type=range]{width:100%;accent-color:var(--primary)}
.cf .vd{font-size:15px;font-weight:800;color:var(--primary);margin-top:3px}
.calc-res{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.cr-c{background:var(--bg);border-radius:var(--rsm);padding:12px;text-align:center;border:1px solid var(--border)}
.cr-n{font-size:20px;font-weight:800;color:var(--primary)}
.cr-l{font-size:10px;color:var(--muted)}

/* ── Setup paths ── */
.paths-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.path-card{background:var(--surface);border-radius:var(--r);border:2px solid var(--border);padding:18px;cursor:pointer;transition:all .15s;text-align:center}
.path-card:hover,.path-card.active{border-color:var(--primary);background:#eff6ff}
.pc-icon{font-size:30px;margin-bottom:8px}
.pc-name{font-size:13px;font-weight:700;margin-bottom:5px}
.pc-cost{font-size:11px;color:var(--muted);margin-bottom:10px}
.pc-detail{font-size:11px;color:var(--muted);line-height:1.7;text-align:right}

/* ── Support programs table ── */
.sup-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sup-tbl th{background:var(--bg);padding:9px 11px;text-align:right;font-weight:700;color:var(--muted);border-bottom:2px solid var(--border)}
.sup-tbl td{padding:9px 11px;border-bottom:1px solid var(--border)}
.sup-tbl tr:hover td{background:var(--bg)}

/* ── Bookmarks empty state ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* ── Section divider ── */
.sec-divider{font-size:12px;font-weight:700;color:var(--muted);padding:8px 0;margin-bottom:8px;border-bottom:1px solid var(--border)}

/* ── Responsive ── */
@media(max-width:768px){
  .sec-layout{grid-template-columns:1fr}
  .sec-sidebar{position:static}
  .tsm{grid-template-columns:repeat(3,1fr)}
  .charts-grid{grid-template-columns:1fr}
  .paths-grid{grid-template-columns:1fr}
  .det-panel{width:100%}
  .ue{grid-template-columns:1fr}
}
</style>
</head>

<div id="app"></div>
<div id="det-ov" class="det-ov" onclick="closeDetail()"></div>
<div id="det-panel" class="det-panel"><div id="det-content"></div></div>

function _get(k) { return _store[k]; }

const S = {
  tab: 'sectors',
  sector: null,
  search: '',
  risk: 'all',
  verdict: 'all',     // GO / مشروط / NO-GO
  sideHustle: false,  // بجانب الوظيفة فقط
  sortBy: 'score',    // score / founder_fit / roi
  microTab: 'list',
  microPath: 'freelancer',

// ══════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════
const sectors = () => (D.sectors || []);
const macro   = () => (D.datasaudi?.macro || {});
const sctxMap = () => (D.datasaudi?.sector_context || {});

function allOpps() {
  const out = [];
  for (const sec of sectors()) {
    for (const o of (sec.opportunities || [])) {
      out.push({ ...o, _sec: sec });
    }
  }
  return out.sort((a, b) => getScore(b) - getScore(a));
}

function allMicro() {
  const out = [];
  for (const sec of sectors()) {
    for (const m of (sec.micro_opportunities || [])) {
      out.push({ ...m, _sec: sec });
    }
  }
  return out.sort((a, b) => (a.startup_cost_num || 0) - (b.startup_cost_num || 0));
}

function filteredOpps(opps) {
  let out = opps.filter(o => {
    // فلتر المخاطرة
    if (S.risk !== 'all') {
      const map = { low: [1, 2], mid: [3], high: [4, 5] };
      if (!(map[S.risk] || []).includes(getRiskNum(o))) return false;
    }
    // فلتر GO/مشروط/NO-GO (التعديل 2)
    if (S.verdict !== 'all') {
      const v = getVerdict(o);
      if (S.verdict === 'go'   && v !== 'GO')      return false;
      if (S.verdict === 'cond' && v !== 'مشروط')   return false;
      if (S.verdict === 'nogo' && v !== 'NO-GO')   return false;
    }
    // فلتر بجانب الوظيفة (التعديل 3)
    if (S.sideHustle && !o.engine?.side_hustle?.feasible) return false;
    // البحث النصي
    if (S.search) {
      const q = S.search.toLowerCase();
      const hay = `${o.name || ''} ${o.problem || ''} ${o.saudi_opportunity || ''} ${o._sec?.sector_name || ''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  // الترتيب الديناميكي (التعديل 4)
  if (S.sortBy === 'founder_fit') out = out.sort((a, b) => (b.engine?.founder_fit?.score || 0) - (a.engine?.founder_fit?.score || 0));
  else if (S.sortBy === 'roi')    out = out.sort((a, b) => getRoiNum(b) - getRoiNum(a));
  else                            out = out.sort((a, b) => getScore(b) - getScore(a));
  return out;
}

function isBm(name) { return S.bookmarks.includes(name); }
function toggleBm(name, e) {
  e && e.stopPropagation();
  const i = S.bookmarks.indexOf(name);
  if (i === -1) S.bookmarks.push(name);
  else S.bookmarks.splice(i, 1);
  localStorage.setItem('ycs_bm', JSON.stringify(S.bookmarks));
  render();
}

function riskBadge(level, num) {
  if (!level) return '';
  const cls = (num || 3) <= 2 ? 'bg' : (num || 3) === 3 ? 'by' : 'br';
  return `<span class="badge ${cls}">${level}</span>`;
}
function roiBadge(level, num) {
  if (!level) return '';
  const cls = (num || 3) >= 4 ? 'bg' : (num || 3) === 3 ? 'bb' : 'bo';
  return `<span class="badge ${cls}">${level}</span>`;
}
function signalBadge(s) {
  const cls = s?.includes('إيجابي') ? 'bg' : s?.includes('محايد') ? 'bb' : 'by';
  return `<span class="badge ${cls}">${s || ''}</span>`;
}
function fmtN(n) { return typeof n === 'number' ? n.toLocaleString('ar-SA') : (n || '—'); }

// ── Score helpers (fix: JSON uses raw_score not score) ──
function getScore(o) {
  if (o.corrected_score != null) return o.corrected_score;
  return o.raw_score || o.engine?.go_nogo?.total_score || 0;
}
function getVerdict(o) { return o.engine?.go_nogo?.verdict || ''; }
function verdictBadge(v) {
  if (!v) return '';
  const cls = v === 'GO' ? 'bg' : v === 'مشروط' ? 'by' : 'br';
  return '<span class="badge ' + cls + '">' + v + '</span>';
}

// ── Risk / ROI computed helpers (these fields don't exist directly in JSON) ──
function getRiskNum(o) {
  const cr = o.engine?.quantified_risks?.composite_risk;
  if (cr != null) return cr > 0.5 ? 5 : cr >= 0.25 ? 3 : 1;
  const highCount = (o.risk_analysis || []).filter(r => r.probability === 'عالي').length;
  return highCount >= 3 ? 5 : highCount >= 1 ? 3 : 1;
}
function getRiskLevel(o) {
  const rn = getRiskNum(o);
  return rn >= 5 ? 'عالي' : rn >= 3 ? 'متوسط' : 'منخفض';
}
function getMicroRiskLevel(m) {
  const cc = m.competitor_count || 0;
  return cc > 5 ? 'عالي' : cc >= 3 ? 'متوسط' : 'منخفض';
}
function getMicroRiskNum(m) {
  const cc = m.competitor_count || 0;
  return cc > 5 ? 5 : cc >= 3 ? 3 : 1;
}
function _parseRevStr(s) {
  if (!s) return 0;
  const m = String(s).match(/([\d,.]+)/);
  const n = m ? parseFloat(m[1].replace(/,/g, '')) : 0;
  return String(s).includes('مليار') ? n * 1000 : n;
}
function getRoiNum(o) {
  const fp = o.financial_projections || {};
  const y3 = _parseRevStr(fp.year3?.expected);
  const y1 = _parseRevStr(fp.year1?.expected);
  if (y1 > 0) { const roi = ((y3 - y1) / y1) * 100; return roi > 100 ? 5 : roi >= 30 ? 3 : 1; }
  return 3;
}
function getRoiPotential(o) {
  const rn = getRoiNum(o); return rn >= 5 ? 'عالي' : rn >= 3 ? 'متوسط' : 'منخفض';
}
function calcMicroRoi12(m) {
  const mr = m.monthly_revenue || 0;
  const mc = m.monthly_costs || 0;
  const ic = m.initial_cost || 0;
  const denom = ic + mc * 12;
  return denom > 0 ? Math.round(((mr - mc) * 12 - ic) / denom * 100) : 0;
}

// ── Summary cards (التعديل 1) ──
function renderSummaryCards(opps) {
  const micro = allMicro();
  const total = opps.length + micro.length;
  const allScores = opps.map(o => getScore(o)).filter(s => s > 0);
  const topScore = allScores.length ? Math.max(...allScores) : '—';
  const ffScores = opps.map(o => o.engine?.founder_fit?.score || 0).filter(s => s > 0);
  const avgFit = ffScores.length ? Math.round(ffScores.reduce((a, b) => a + b, 0) / ffScores.length) : '—';
  const goCount = opps.filter(o => getVerdict(o) === 'GO').length;
  const sc = s => '<div style="background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 10px;text-align:center;box-shadow:var(--sh);flex:1">';
  return '<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">' +
    sc() + '<div style="font-size:22px;margin-bottom:2px">🎯</div><div style="font-size:22px;font-weight:900;color:#2563eb">' + total + '</div><div style="font-size:11px;color:var(--muted);margin-top:2px">إجمالي الفرص</div></div>' +
    sc() + '<div style="font-size:22px;margin-bottom:2px">🏆</div><div style="font-size:22px;font-weight:900;color:#16a34a">' + topScore + '</div><div style="font-size:11px;color:var(--muted);margin-top:2px">أعلى درجة</div></div>' +
    sc() + '<div style="font-size:22px;margin-bottom:2px">📊</div><div style="font-size:22px;font-weight:900;color:#d97706">' + (avgFit !== '—' ? avgFit + '%' : '—') + '</div><div style="font-size:11px;color:var(--muted);margin-top:2px">متوسط التوافق</div></div>' +
    sc() + '<div style="font-size:22px;margin-bottom:2px">✅</div><div style="font-size:22px;font-weight:900;color:#16a34a">' + goCount + '</div><div style="font-size:11px;color:var(--muted);margin-top:2px">فرص GO</div></div>' +
  '</div>';
}

// ══════════════════════════════════════════════
// Score ring SVG
// ══════════════════════════════════════════════
function scoreRing(score, sz) {
  sz = sz || 54;
  const r = 15.9, circ = 2 * Math.PI * r;
  const dash = Math.min((score / 100) * circ, circ);
  const c = score >= 75 ? '#16a34a' : score >= 60 ? '#2563eb' : score >= 45 ? '#d97706' : '#dc2626';
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="3.2"/>
    <circle cx="18" cy="18" r="${r}" fill="none" stroke="${c}" stroke-width="3.2"
      stroke-dasharray="${dash.toFixed(1)} ${(circ - dash).toFixed(1)}"
      stroke-linecap="round" transform="rotate(-90 18 18)"/>
    <text x="18" y="21" text-anchor="middle" font-size="8" font-weight="bold"
      fill="${c}" font-family="Tajawal,sans-serif">${score}</text>
  </svg>`;
}

          const cnt = (s.opportunities || []).length;
          const mc = (s.micro_opportunities || []).length;
          const mkt = s.market_assessment || {};
          const sig = mkt.overall_signal || '';
          const sigCls = sig.includes('إيجابي قوي') ? 'background:#dcfce7;color:#166534' :
                         sig.includes('إيجابي') ? 'background:#dbeafe;color:#1e40af' :
                         sig.includes('محايد') ? 'background:#f1f5f9;color:#475569' : 'background:#fee2e2;color:#991b1b';
          return '<div class="sec-card" onclick="setSector(\'' + s.sector_id + '\')">' +
            '<div class="sc-icon">' + (s.icon || '') + '</div>' +
            '<div class="sc-name">' + (s.sector_name || '') + '</div>' +
            '<div class="sc-en">' + (s.sector_name_en || '') + '</div>' +
            '<div class="sc-stats">' +
              '<div><div class="sc-sn" style="color:#2563eb">' + cnt + '</div><div class="sc-sl">فرص كبيرة</div></div>' +
              '<div><div class="sc-sn" style="color:#f59e0b">' + mc + '</div><div class="sc-sl">مصغّرة</div></div>' +
              (mkt.market_size ? '<div><div class="sc-sn" style="font-size:12px;color:#1e293b">' + mkt.market_size + '</div><div class="sc-sl">حجم السوق</div></div>' : '') +
            '</div>' +
            (sig ? '<div class="sc-signal" style="' + sigCls + '">' + sig + '</div>' : '') +
          '</div>';
        }).join('') +
        '</div>';
    }
  }

  return '<div class="sec-layout">' + sidebar + '<div>' + content + '</div></div>';
}

function initCharts(opps, secs) {
  // Destroy previous
  Object.values(S.charts).forEach(c => { try { c.destroy(); } catch (e) {} });
  S.charts = {};

  // 1. Top 10 scores bar
  const top10 = opps.slice(0, 10);
  const scoresEl = document.getElementById('ch-scores');
  if (scoresEl) {
    S.charts.scores = new Chart(scoresEl, {
      type: 'bar',
      data: {
        labels: top10.map(o => (o.name || '').split(' ').slice(0, 3).join(' ')),
        datasets: [{ label: 'الدرجة', data: top10.map(o => getScore(o)),
          backgroundColor: top10.map(o => getScore(o) >= 75 ? '#16a34a80' : getScore(o) >= 60 ? '#2563eb80' : '#f59e0b80'),
          borderColor: top10.map(o => getScore(o) >= 75 ? '#16a34a' : getScore(o) >= 60 ? '#2563eb' : '#f59e0b'),
          borderWidth: 2, borderRadius: 6 }]
      },
      options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { min: 0, max: 100 } } }
    });
  }

  // 2. Risk distribution pie
  const riskCount = { 'منخفض': 0, 'متوسط': 0, 'عالي': 0 };
  opps.forEach(o => {
    const rn = getRiskNum(o);
    const rl = getRiskLevel(o);
    // "متوسط-عالي" → متوسط (not عالي)
    if (rl.includes('متوسط-عالي') || rl === 'متوسط-عالي') riskCount['متوسط']++;
    else if (rn <= 2) riskCount['منخفض']++;
    else if (rn === 3) riskCount['متوسط']++;
    else riskCount['عالي']++;
  });
  const riskEl = document.getElementById('ch-risk');
  if (riskEl) {
    S.charts.risk = new Chart(riskEl, {
      type: 'doughnut',
      data: {
        labels: Object.keys(riskCount),
        datasets: [{ data: Object.values(riskCount),
          backgroundColor: ['#16a34a80', '#f59e0b80', '#dc262680'],
          borderColor: ['#16a34a', '#f59e0b', '#dc2626'], borderWidth: 2 }]
      },
      options: { plugins: { legend: { position: 'bottom' } } }
    });
  }

  // 3. Sector comparison bar
  const secEl = document.getElementById('ch-sectors');
  if (secEl) {
    S.charts.sectors = new Chart(secEl, {
      type: 'bar',
      data: {
        labels: secs.map(s => s.icon + ' ' + (s.sector_name || s.sector_id)),
        datasets: [
          { label: 'فرص كبيرة', data: secs.map(s => (s.opportunities || []).length), backgroundColor: '#2563eb80', borderColor: '#2563eb', borderWidth: 2, borderRadius: 4 },
          { label: 'مصغّرة', data: secs.map(s => (s.micro_opportunities || []).length), backgroundColor: '#f59e0b80', borderColor: '#f59e0b', borderWidth: 2, borderRadius: 4 },
        ]
      },
      options: { plugins: { legend: { position: 'bottom' } }, scales: { x: { stacked: false } } }
    });
  }

  // 4. Risk vs ROI scatter
  const scEl = document.getElementById('ch-scatter');
  if (scEl) {
    const colors = ['#2563eb', '#16a34a', '#f59e0b', '#dc2626', '#7c3aed', '#c2410c', '#0891b2', '#be185d', '#ca8a04', '#4f46e5'];
    S.charts.scatter = new Chart(scEl, {
      type: 'scatter',
      data: {
        datasets: secs.map((sec, i) => ({
          label: sec.sector_name || sec.sector_id,
          data: (sec.opportunities || []).map(o => ({ x: getRiskNum(o), y: getRoiNum(o), name: o.name })),
          backgroundColor: colors[i % colors.length] + '90',
          borderColor: colors[i % colors.length],
          pointRadius: 7, pointHoverRadius: 9,
        }))
      },
      options: {
        plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: ctx => ctx.raw?.name || ctx.dataset.label } } },
        scales: {
          x: { min: 0.5, max: 5.5, title: { display: true, text: 'المخاطرة' }, ticks: { stepSize: 1 } },
          y: { min: 0.5, max: 5.5, title: { display: true, text: 'العائد المتوقع' }, ticks: { stepSize: 1 } }
        }
      }
    });
  }
}

// Tab: مصفوفة المخاطر
// ══════════════════════════════════════════════
function renderMatrix(opps) {
  // 5×5 grid: rows = ROI (5 top → 1 bottom), cols = risk (1 left → 5 right)
  const cells = {};
  for (let r = 1; r <= 5; r++) for (let c = 1; c <= 5; c++) cells[r + '-' + c] = [];
  opps.forEach(o => {
    const rk = getRiskNum(o);
    const ro = getRoiNum(o);
    cells[ro + '-' + rk].push(o);
  });

  const roiLabels = ['عالي جداً', 'مرتفع', 'متوسط', 'منخفض', 'ضعيف'];
  const riskLabels = ['منخفض جداً', 'منخفض', 'متوسط', 'عالي', 'عالي جداً'];

  const colLabels = '<div class="matrix-labels">' + riskLabels.map(l => '<div class="matrix-lbl">' + l + '</div>').join('') + '</div>';

  const rows = [5, 4, 3, 2, 1].map((ro, ri) => {
    const rowCells = [1, 2, 3, 4, 5].map(rk => {
      const key = ro + '-' + rk;
      const cls = 'mc-' + (4 - ri) + (rk - 1);
      const chips = cells[key].map(o => {
        const chipKey = _put(o);
        return '<div class="mat-chip" title="' + (o.name || '') + '" onclick="openDetail(\'' + chipKey + '\')">' +
          (o._sec?.icon || '') + ' ' + (o.name || '') + '</div>';
      }).join('');
      return '<div class="matrix-cell ' + cls + '">' + chips + '</div>';
    }).join('');
    return '<div class="matrix-row">' +
      '<div class="matrix-row-lbl">' + roiLabels[ri] + '</div>' +
      rowCells +
    '</div>';
  }).join('');

  const legend = '<div class="matrix-legend">' +
    '<div class="ml-item"><div class="ml-box" style="background:#dcfce7"></div>منطقة خضراء (عائد عالٍ، مخاطرة منخفضة)</div>' +
    '<div class="ml-item"><div class="ml-box" style="background:#fffbeb"></div>منطقة صفراء (توازن)</div>' +
    '<div class="ml-item"><div class="ml-box" style="background:#fee2e2"></div>منطقة حمراء (مخاطرة عالية)</div>' +
  '</div>';

  return '<div class="matrix-wrap">' +
    '<div class="matrix-title">مصفوفة المخاطر مقابل العائد — المحور الأفقي: المخاطرة · المحور الرأسي: العائد المتوقع</div>' +
    colLabels + rows + legend +
  '</div>';
}

function renderMicro(micro) {
  const subTabs = [
    { id: 'list',    label: '📋 قائمة الفرص' },
    { id: 'calc',    label: '🧮 حاسبة الجدوى' },
    { id: 'paths',   label: '🛤 مسارات التأسيس' },
    { id: 'support', label: '🏛 دعم حكومي' },
  ];
  const nav = '<div class="micro-sub-tabs">' +
    subTabs.map(t => '<button class="mst-btn' + (S.microTab === t.id ? ' active' : '') + '" onclick="setMicroTab(\'' + t.id + '\')">' + t.label + '</button>').join('') +
  '</div>';

  let content = '';
  switch (S.microTab) {
    case 'list':
      content = micro.length ? micro.map(m => microCard(m)).join('') :
        '<div class="empty"><div class="empty-icon">⚡</div>لا توجد فرص مصغّرة في هذا المسح</div>';

      break;

  return nav + content;

function renderCalc() {
  const { invest, revenue, costs } = S.calc;
  const profit = revenue - costs;
  const margin = revenue > 0 ? ((profit / revenue) * 100).toFixed(1) : 0;
  const breakEven = costs > 0 && profit > 0 ? Math.ceil(invest / profit) : '∞';
  const roi12 = invest > 0 ? (((profit * 12 - invest) / invest) * 100).toFixed(1) : 0;
  const ltv = profit * 24;

  return '<div class="calc-panel">' +
    '<h3>🧮 حاسبة جدوى الفرصة المصغّرة</h3>' +
    '<div class="calc-fields">' +
      '<div class="cf"><label>رأس المال المبدئي (ريال)</label>' +
      '<input type="range" min="5000" max="100000" step="1000" value="' + invest + '" oninput="updateCalc(\'invest\',this.value)">' +
      '<div class="vd">' + fmtN(invest) + ' ريال</div></div>' +

      '<div class="cf"><label>الإيراد الشهري المتوقع (ريال)</label>' +
      '<input type="range" min="2000" max="80000" step="500" value="' + revenue + '" oninput="updateCalc(\'revenue\',this.value)">' +
      '<div class="vd">' + fmtN(revenue) + ' ريال/شهر</div></div>' +

      '<div class="cf"><label>التكاليف الشهرية (ريال)</label>' +
      '<input type="range" min="1000" max="60000" step="500" value="' + costs + '" oninput="updateCalc(\'costs\',this.value)">' +
      '<div class="vd">' + fmtN(costs) + ' ريال/شهر</div></div>' +
    '</div>' +
    '<div class="calc-res">' +
      '<div class="cr-c"><div class="cr-n" style="color:' + (profit >= 0 ? 'var(--success)' : 'var(--danger)') + '">' + fmtN(profit) + '</div><div class="cr-l">الربح الشهري (ريال)</div></div>' +
      '<div class="cr-c"><div class="cr-n">' + margin + '%</div><div class="cr-l">هامش الربح</div></div>' +
      '<div class="cr-c"><div class="cr-n">' + breakEven + '</div><div class="cr-l">شهر للتعادل</div></div>' +
      '<div class="cr-c"><div class="cr-n" style="color:' + (roi12 >= 0 ? 'var(--success)' : 'var(--danger)') + '">' + roi12 + '%</div><div class="cr-l">ROI السنة الأولى</div></div>' +
      '<div class="cr-c"><div class="cr-n">' + fmtN(ltv) + '</div><div class="cr-l">القيمة التراكمية 24 شهر</div></div>' +
    '</div>' +
  '</div>';
}

    return true;
  });

  const examples = pathMicro.length > 0 ? '<div style="margin-top:16px"><div class="sec-divider">فرص مصغّرة مناسبة لهذا المسار</div>' + pathMicro.map(m => microCard(m)).join('') + '</div>' : '';

  return cards + detail + examples;
}

function renderSupport(micro) {
  // Collect all support programs from micro opportunities
  const programs = [];
  const seen = new Set();
  micro.forEach(m => {
    (m.support_programs || []).forEach(p => {
      const key = p.program + p.body;
      if (!seen.has(key)) {
        seen.add(key);
        programs.push({ ...p, _opp: m.name });
      }
    });
  });

  const staticPrograms = [
    { program: 'منشآت', body: 'هيئة المنشآت الصغيرة والمتوسطة', benefit: 'استشارات مجانية، تدريب، تمويل', eligibility: 'منشآت صغيرة ومتوسطة' },
    { program: 'برنامج كفالة', body: 'صندوق كفالة', benefit: 'ضمانات قروض بنكية تصل لـ 95%', eligibility: 'مواطن سعودي، نشاط تجاري' },
    { program: 'برنامج ريادة', body: 'بنك التنمية الاجتماعية', benefit: 'قروض بلا فوائد حتى 300,000 ريال', eligibility: 'مواطن 18-60 سنة' },
    { program: 'مسرّع Flat6Labs', body: 'Flat6Labs جدة/الرياض', benefit: 'استثمار + إرشاد + شبكة علاقات', eligibility: 'شركات ناشئة تقنية في مرحلة مبكرة' },
    { program: 'منصة نطاقات', body: 'وزارة الموارد البشرية', benefit: 'تصنيف سعودة مميز', eligibility: 'المنشآت الملتزمة بنسب السعودة' },
    { program: 'برنامج قدرات', body: 'مركز قدرات للاستشارات', benefit: 'دعم فني وتدريبي مجاني', eligibility: 'رواد الأعمال السعوديين' },
  ];

  const allPrograms = [...staticPrograms, ...programs.filter(p => !staticPrograms.find(sp => sp.program === p.program))];

  return '<div style="background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:20px;margin-bottom:18px">' +
    '<div style="font-size:14px;font-weight:700;margin-bottom:14px">🏛 برامج الدعم الحكومي والشبه حكومي</div>' +
    '<table class="sup-tbl">' +
    '<thead><tr><th>البرنامج</th><th>الجهة</th><th>نوع الدعم</th><th>شرط الأهلية</th></tr></thead>' +
    '<tbody>' +
    allPrograms.map(p => '<tr>' +
      '<td><strong>' + p.program + '</strong></td>' +
      '<td>' + p.body + '</td>' +
      '<td>' + p.benefit + '</td>' +
      '<td>' + p.eligibility + '</td>' +
    '</tr>').join('') +
    '</tbody></table>' +
  '</div>';
}

function renderBookmarks(opps) {
  if (!S.bookmarks.length) {
    return '<div class="empty"><div class="empty-icon">🔖</div><div>لا توجد فرص محفوظة بعد</div><div style="font-size:12px;margin-top:8px">اضغط ☆ على أي فرصة لحفظها هنا</div></div>';
  }
  const bms = opps.filter(o => S.bookmarks.includes(o.name));
  if (!bms.length) {
    return '<div class="empty"><div class="empty-icon">🔖</div>الفرص المحفوظة غير موجودة في هذا المسح</div>';
  }
  return '<div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
      '<span style="font-size:14px;font-weight:700">' + bms.length + ' فرصة محفوظة</span>' +
      '<button class="flt-btn" onclick="clearBookmarks()" style="color:var(--danger)">حذف الكل</button>' +
    '</div>' +
    bms.map(o => oppCard(o)).join('') +
  '</div>';
}

function openDetail(key) {
  const opp = _get(key);
  if (!opp) return;
  document.getElementById('det-content').innerHTML = renderDetail(opp);
  document.getElementById('det-panel').scrollTop = 0;
  document.getElementById('det-ov').classList.add('open');
  document.getElementById('det-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openMicroDetail(key) {
  const m = _get(key);
  if (!m) return;
  document.getElementById('det-content').innerHTML = renderMicroDetail(m);
  document.getElementById('det-panel').scrollTop = 0;
  document.getElementById('det-ov').classList.add('open');
  document.getElementById('det-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('det-ov').classList.remove('open');
  document.getElementById('det-panel').classList.remove('open');
  document.body.style.overflow = '';
}

function renderDetail(o) {
  const bm = isBm(o.name);
  const bmName = (o.name || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  const _riskLevel = getRiskLevel(o);
  const _riskNum   = getRiskNum(o);
  const _roiPotential = getRoiPotential(o);
  const _roiNum    = getRoiNum(o);

  // ① Large score ring header
  const hdr =
    '<div class="det-hdr">' +
      '<div class="sr-wrap">' + scoreRing(getScore(o), 72) + '</div>' +
      '<div style="flex:1">' +
        '<div style="font-size:16px;font-weight:800;margin-bottom:4px">' + (o.name || '') + '</div>' +
        '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">' +
          (o._sec?.icon || '') + ' ' + (o._sec?.sector_name || '') +
          (o.valuation ? ' · ' + o.valuation : '') +
        '</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">' +
          verdictBadge(getVerdict(o)) +    // التعديل 6 في panel
          '<span style="display:inline-flex;align-items:center;gap:3px"><span style="font-size:10px;color:var(--muted);font-weight:600">المخاطرة:</span>' + riskBadge(_riskLevel, _riskNum) + '</span>' +
          '<span style="display:inline-flex;align-items:center;gap:3px"><span style="font-size:10px;color:var(--muted);font-weight:600">العائد:</span>' + roiBadge(_roiPotential, _roiNum) + '</span>' +
          (o.investment_range ? '<span style="display:inline-flex;align-items:center;gap:3px"><span style="font-size:10px;color:var(--muted);font-weight:600">الميزانية:</span><span class="badge bb">' + o.investment_range + '</span></span>' : '') +
          (o.time_to_market ? '<span style="display:inline-flex;align-items:center;gap:3px"><span style="font-size:10px;color:var(--muted);font-weight:600">الوقت:</span><span class="badge bp">' + o.time_to_market + '</span></span>' : '') +
          (o.engine?.side_hustle?.feasible ? '<span class="badge bg">💼 بجانب وظيفتك ✓</span>' : '') +   // التعديل 8 في panel
        '</div>' +
      '</div>' +
      '<button class="bm-btn' + (bm ? ' on' : '') + '" onclick="toggleBm(\'' + bmName + '\',event)" title="حفظ">' + (bm ? '🔖' : '☆') + '</button>' +
      '<button class="det-close" onclick="closeDetail()" title="إغلاق">✕</button>' +
    '</div>';

  // ━━ التعديل 12: مقارنة الدرجات الثلاث ━━
  const rawSc   = o.raw_score || 0;
  const corrSc  = o.corrected_score;
  const detSc   = o.engine?.deterministic_score || 0;
  const adjList = o.score_adjustments || [];
  const sanWarn = o.sanity_warnings || [];
  const scoreCompHtml =
    '<div class="det-sec"><div class="det-sec-title">① مقارنة الدرجات (خام → مصحح → حتمي)</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px">' +
      '<div style="background:var(--bg);border-radius:var(--rsm);padding:12px;text-align:center;border:1px solid var(--border)">' +
        '<div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">🔢 الخام (Claude)</div>' +
        '<div style="font-size:24px;font-weight:900;color:var(--primary)">' + rawSc + '</div>' +
      '</div>' +
      '<div style="background:var(--bg);border-radius:var(--rsm);padding:12px;text-align:center;border:1px solid var(--border)">' +
        '<div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">✏️ المصحح</div>' +
        '<div style="font-size:24px;font-weight:900;color:' + (corrSc != null ? 'var(--warn)' : 'var(--faint)') + '">' + (corrSc != null ? corrSc : '—') + '</div>' +
      '</div>' +
      '<div style="background:var(--bg);border-radius:var(--rsm);padding:12px;text-align:center;border:1px solid var(--border)">' +
        '<div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">⚙️ الحتمي</div>' +
        '<div style="font-size:24px;font-weight:900;color:var(--success)">' + detSc + '</div>' +
      '</div>' +
    '</div>' +
    (adjList.length ? '<div style="font-size:11px;color:var(--muted);margin-bottom:6px"><strong>تعديلات التصحيح:</strong> ' + adjList.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' · ') + '</div>' : '') +
    (sanWarn.length ? '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:var(--rsm);padding:10px"><strong style="font-size:11px;color:var(--danger)">⚠️ تحذيرات الواقعية:</strong>' + sanWarn.map(w => '<div style="font-size:11px;color:#991b1b;margin-top:3px">• ' + (typeof w === 'string' ? w : JSON.stringify(w)) + '</div>').join('') + '</div>' : '') +
    '</div>';

  // ② Score breakdown — bars + score/max + justification note
  const sb = o.raw_score_breakdown || o.score_breakdown || {};
  const sbOrder = ['market_size_growth','market_gap','vision_2030_alignment','infrastructure_readiness','execution_feasibility','datasaudi_support'];
  const sbLabels = {
    market_size_growth:      'حجم السوق والنمو',
    market_gap:              'فجوة السوق',
    vision_2030_alignment:   'التوافق مع رؤية 2030',
    infrastructure_readiness:'جاهزية البنية التحتية',
    execution_feasibility:   'قابلية التنفيذ',
    datasaudi_support:       'دعم مؤشرات DataSaudi',
  };
  const sbRows = sbOrder.filter(k => sb[k]).map(k => {
    const v = sb[k];
    const pct = v.max ? Math.min(100, (v.score / v.max) * 100) : 0;
    const barColor = pct >= 80 ? 'var(--success)' : pct >= 55 ? 'var(--primary)' : pct >= 35 ? 'var(--warn)' : 'var(--danger)';
    const corrected = '';
    return '<div style="margin-bottom:10px">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">' +
        '<span style="flex:1;font-size:12px;color:var(--muted)">' + (sbLabels[k] || k) + corrected + '</span>' +
        '<span style="font-weight:700;font-size:13px;color:' + barColor + '">' + v.score + '</span>' +
        '<span style="font-size:11px;color:var(--faint)">/ ' + v.max + '</span>' +
      '</div>' +
      '<div style="height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:3px">' +
        '<div style="height:100%;width:' + pct + '%;background:' + barColor + ';border-radius:4px;transition:width .4s"></div>' +
      '</div>' +
      (v.note ? '<div style="font-size:11px;color:var(--faint);line-height:1.5">' + v.note + '</div>' : '') +
    '</div>';
  }).join('');
  const scoreSection = sbRows ?
    '<div class="det-sec"><div class="det-sec-title">② تفصيل الدرجة</div>' + sbRows + '</div>' : '';

  // ━━ التعديل 13: المخاطر الكمية (7 أنواع) ━━
  const riskTypes7 = ['تنظيمي','سوقي','مالي','تشغيلي','تقني','تنافسي','جيوسياسي'];
  const probMap = { 'عالي': 3, 'متوسط': 2, 'منخفض': 1 };
  const existingRisks = o.risk_analysis || [];
  const risk7Html = (() => {
    const rows = riskTypes7.map(rt => {
      const found = existingRisks.find(r => (r.risk||r.type||'').includes(rt));
      const prob = found ? (probMap[found.probability] || 2) : 1;
      const imp  = found ? (probMap[found.impact]      || 2) : 1;
      const composite = (prob * imp);
      const pct = Math.round((composite / 9) * 100);
      const color = pct >= 67 ? 'var(--danger)' : pct >= 34 ? 'var(--warn)' : 'var(--success)';
      return '<div style="margin-bottom:7px">' +
        '<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">' +
          '<span style="color:var(--muted)">' + rt + '</span>' +
          '<span style="font-weight:700;font-size:12px;color:' + color + '">' + (found ? found.probability + ' × ' + found.impact : 'لا بيانات') + '</span>' +
        '</div>' +
        '<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">' +
          '<div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:3px"></div>' +
        '</div>' +
      '</div>';
    }).join('');
    const totalComposite = riskTypes7.reduce((acc, rt) => {
      const found = existingRisks.find(r => (r.risk||r.type||'').includes(rt));
      const prob = found ? (probMap[found.probability] || 2) : 1;
      const imp  = found ? (probMap[found.impact]      || 2) : 1;
      return acc + (prob * imp);
    }, 0);
    const compPct = Math.round((totalComposite / (9 * 7)) * 100);
    const compColor = compPct >= 60 ? 'var(--danger)' : compPct >= 35 ? 'var(--warn)' : 'var(--success)';
    return '<div class="det-sec"><div class="det-sec-title">⑬ المخاطر الكمية (7 أنواع)</div>' +
      rows +
      '<div style="background:var(--bg);border-radius:var(--rsm);padding:10px;border:1px solid var(--border);margin-top:6px">' +
        '<div style="font-size:11px;color:var(--muted);margin-bottom:4px">المخاطرة المركبة الإجمالية</div>' +
        '<div style="height:10px;background:var(--border);border-radius:5px;overflow:hidden">' +
          '<div style="height:100%;width:' + compPct + '%;background:' + compColor + ';border-radius:5px"></div>' +
        '</div>' +
        '<div style="font-size:12px;font-weight:700;color:' + compColor + ';margin-top:4px">' + compPct + '% مخاطرة مركبة</div>' +
      '</div>' +
    '</div>';
  })();

  // ━━ التعديل 14: تحليل الحساسية ━━
  const sens = o.engine?.sensitivity || {};
  const sensHtml = (sens.worst_case_roi !== undefined || sens.base_case_roi !== undefined || sens.best_case_roi !== undefined) ?
    '<div class="det-sec"><div class="det-sec-title">⑭ تحليل الحساسية (ROI)</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">' +
      '<div style="background:#fef2f2;border-radius:var(--rsm);padding:12px;text-align:center;border:1px solid #fecaca">' +
        '<div style="font-size:10px;color:var(--danger);font-weight:700;margin-bottom:4px">📉 أسوأ حال</div>' +
        '<div style="font-size:18px;font-weight:800;color:var(--danger)">' + (sens.worst_case_roi != null ? sens.worst_case_roi + '%' : '—') + '</div>' +
      '</div>' +
      '<div style="background:#eff6ff;border-radius:var(--rsm);padding:12px;text-align:center;border:1px solid #bfdbfe">' +
        '<div style="font-size:10px;color:var(--primary);font-weight:700;margin-bottom:4px">📊 أساسي</div>' +
        '<div style="font-size:18px;font-weight:800;color:var(--primary)">' + (sens.base_case_roi != null ? sens.base_case_roi + '%' : (sens.worst_case_roi != null && sens.best_case_roi != null ? Math.round((sens.worst_case_roi + sens.best_case_roi) / 2) + '%' : '—')) + '</div>' +
      '</div>' +
      '<div style="background:#f0fdf4;border-radius:var(--rsm);padding:12px;text-align:center;border:1px solid #bbf7d0">' +
        '<div style="font-size:10px;color:var(--success);font-weight:700;margin-bottom:4px">📈 أفضل حال</div>' +
        '<div style="font-size:18px;font-weight:800;color:var(--success)">' + (sens.best_case_roi != null ? sens.best_case_roi + '%' : '—') + '</div>' +
      '</div>' +
    '</div></div>' : '';

  // ━━ التعديل 15: دورة المبيعات ━━
  const sc_data = o.engine?.sales_cycle || {};
  const scHtml = Object.keys(sc_data).length ?
    '<div class="det-sec"><div class="det-sec-title">⑮ دورة المبيعات</div>' +
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:10px">' +

      (sc_data.type ? '<div style="background:var(--bg);border-radius:var(--rsm);padding:10px;border:1px solid var(--border)"><div style="font-size:10px;color:var(--muted)">النوع</div><div style="font-size:14px;font-weight:700">' + sc_data.type + '</div></div>' : '') +
    '</div>' +
    (Array.isArray(sc_data.pipeline_stages) && sc_data.pipeline_stages.length ?
      '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
      sc_data.pipeline_stages.map((s, i) => '<span style="background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600">' + (i+1) + '. ' + s + '</span>').join('') +
      '</div>' : '') +
    '</div>' : '';

  // ━━ التعديل 16: الفريق المطلوب ━━
  const team = o.engine?.required_team || {};
  const teamHtml = (team.initial_headcount > 0 || (team.roles && team.roles.length > 0)) ?
    '<div class="det-sec"><div class="det-sec-title">⑯ الفريق المطلوب</div>' +
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">' +
      (team.initial_headcount ? '<span class="badge bb">👥 ' + team.initial_headcount + ' أشخاص</span>' : '') +
      (team.timeline ? '<span class="badge bp">⏱ ' + team.timeline + '</span>' : '') +
    '</div>' +
    (Array.isArray(team.roles) && team.roles.length ?
      '<table style="width:100%;border-collapse:collapse;font-size:12px">' +
      '<thead><tr>' +
        '<th style="background:var(--bg);padding:7px 9px;text-align:right;border:1px solid var(--border);color:var(--muted)">الدور</th>' +
        '<th style="background:var(--bg);padding:7px 9px;text-align:center;border:1px solid var(--border);color:var(--muted)">الراتب الشهري</th>' +
        '<th style="background:var(--bg);padding:7px 9px;text-align:center;border:1px solid var(--border);color:var(--muted)">متى</th>' +
      '</tr></thead><tbody>' +
      team.roles.map(r => '<tr><td style="padding:7px 9px;border:1px solid var(--border);font-weight:600">' + (r.title||r.role||r) + '</td>' +
        '<td style="padding:7px 9px;border:1px solid var(--border);text-align:center">' + (r.salary || '—') + '</td>' +
        '<td style="padding:7px 9px;border:1px solid var(--border);text-align:center">' + (r.when || '—') + '</td></tr>').join('') +
      '</tbody></table>' : '') +
    '</div>' : '';

  // ━━ التعديل 17: اختبار قبل الصرف ━━
  const pst = o.pre_spend_test || o.validation_plan || null;
  const pstHtml = pst ?
    '<div class="det-sec"><div class="det-sec-title">⑰ اختبار قبل الصرف</div>' +
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px">' +
      (pst.hypothesis ? '<div style="grid-column:1/-1;background:#fff7ed;border-radius:var(--rsm);padding:10px;border:1px solid #fed7aa;font-size:12px"><strong>الفرضية:</strong> ' + pst.hypothesis + '</div>' : '') +
      (pst.method ? '<div style="background:var(--bg);border-radius:var(--rsm);padding:10px;border:1px solid var(--border);font-size:12px"><strong>الطريقة:</strong> ' + pst.method + '</div>' : '') +
      (pst.cost ? '<div style="background:var(--bg);border-radius:var(--rsm);padding:10px;border:1px solid var(--border);font-size:12px"><strong>التكلفة:</strong> ' + pst.cost + '</div>' : '') +
      (pst.success_metric ? '<div style="grid-column:1/-1;background:#f0fdf4;border-radius:var(--rsm);padding:10px;border:1px solid #bbf7d0;font-size:12px"><strong>مقياس النجاح:</strong> ' + pst.success_metric + '</div>' : '') +
    '</div></div>' : '';

  // ━━ التعديل 18: KPIs أول 90 يوم ━━
  const kpis = o.kpis_90_days || o.milestones_90 || null;
  const kpisHtml = kpis ?
    '<div class="det-sec"><div class="det-sec-title">⑱ KPIs أول 90 يوم</div>' +
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">' +
      ['day30','day60','day90'].map((d, i) => {
        const day = kpis[d] || kpis['day_' + ((i+1)*30)] || null;
        return day ? '<div style="background:var(--bg);border-radius:var(--rsm);padding:12px;border:1px solid var(--border);text-align:center">' +
          '<div style="font-size:10px;font-weight:700;color:var(--primary);margin-bottom:6px">يوم ' + ((i+1)*30) + '</div>' +
          '<div style="font-size:12px;color:var(--muted)">' + day + '</div></div>' : '';
      }).join('') +
    '</div></div>' : '';

  // ③ Score correction banner removed — corrected score displays as final score silently

  // ④ Sanity check warnings — JSON has sanity_warnings[] (array of strings), not sanity_check.flags
  const flags = o.sanity_warnings || [];
  const sanityHtml = flags.length ?
    '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:var(--rsm);padding:12px 14px;margin-bottom:16px">' +
      '<strong style="font-size:12px;color:var(--danger)">🚩 تحذيرات الواقعية المالية</strong>' +
      flags.map(f => '<div style="font-size:11px;color:#991b1b;margin-top:5px">• ' + (typeof f === 'string' ? f : JSON.stringify(f)) + '</div>').join('') +
    '</div>' : '';

  // ⑤ Problem / Solution / Saudi Opportunity
  // JSON الجديد لا يحتوي problem/solution كحقول مستقلة — نستخدم description_ar كـ fallback
  const _hasPss = o.problem || o.solution || o.description_ar;
  const pss = _hasPss ?
    '<div class="det-sec"><div class="det-sec-title">⑤ المشكلة · الحل · الفرصة</div>' +
      (o.problem ?
        '<div style="background:#fff7ed;border-radius:var(--rsm);padding:12px;margin-bottom:8px;font-size:13px;border:1px solid #fed7aa;line-height:1.7">' +
          '<strong>🔴 المشكلة:</strong> ' + o.problem +
        '</div>' : '') +
      (o.solution ?
        '<div style="background:#f0fdf4;border-radius:var(--rsm);padding:12px;margin-bottom:8px;font-size:13px;border:1px solid #bbf7d0;line-height:1.7">' +
          '<strong>🟢 الحل:</strong> ' + o.solution +
        '</div>' : '') +
      (!o.problem && !o.solution && o.description_ar ?
        '<div style="background:#f8fafc;border-radius:var(--rsm);padding:12px;margin-bottom:8px;font-size:13px;border:1px solid var(--border);line-height:1.7">' +
          '<strong>📋 الوصف:</strong> ' + o.description_ar +
        '</div>' : '') +
      (o.saudi_opportunity ?
        '<div style="background:#eff6ff;border-radius:var(--rsm);padding:12px;font-size:13px;border:1px solid #bfdbfe;line-height:1.7">' +
          '<strong>🇸🇦 الفرصة في السعودية:</strong> ' + o.saudi_opportunity +
        '</div>' : '') +
    '</div>' : '';

  // ⑥ TAM / SAM / SOM — JSON uses "market" not "market_sizing"
  const ms = o.market || {};
  const tsmSection = (ms.tam || ms.sam || ms.som) ?
    '<div class="det-sec"><div class="det-sec-title">⑥ حجم السوق</div>' +
      '<div class="tsm">' +
        '<div class="tsm-c" style="border-top:3px solid #7c3aed"><div class="tsm-l">TAM — إجمالي السوق</div><div class="tsm-v" style="color:#7c3aed">' + (ms.tam || '—') + '</div></div>' +
        '<div class="tsm-c" style="border-top:3px solid var(--primary)"><div class="tsm-l">SAM — السوق المستهدف</div><div class="tsm-v" style="color:var(--primary)">' + (ms.sam || '—') + '</div></div>' +
        '<div class="tsm-c" style="border-top:3px solid var(--success)"><div class="tsm-l">SOM — الحصة الواقعية</div><div class="tsm-v" style="color:var(--success)">' + (ms.som || '—') + '</div></div>' +
      '</div>' +
    '</div>' : '';

  // ⑦ Unit Economics
  const ue = o.unit_economics || {};
  const ltvRatio = parseFloat(ue.ltv_cac_ratio) || 0;
  const ueSection = Object.keys(ue).length ?
    '<div class="det-sec"><div class="det-sec-title">⑦ الاقتصاديات الوحدية</div>' +
      '<div class="ue">' +
        '<div class="ue-c"><div class="ue-l">CAC — تكلفة الاكتساب</div><div class="ue-v">' + (ue.cac || '—') + '</div></div>' +
        '<div class="ue-c"><div class="ue-l">LTV — القيمة مدى الحياة</div><div class="ue-v">' + (ue.ltv || '—') + '</div></div>' +
        '<div class="ue-c"><div class="ue-l">LTV : CAC</div><div class="ue-v" style="color:' + (ltvRatio >= 3 ? 'var(--success)' : ltvRatio >= 1 ? 'var(--warn)' : 'var(--danger)') + '">' + (ue.ltv_cac_ratio || '—') + 'x</div></div>' +
        '<div class="ue-c"><div class="ue-l">هامش الربح الإجمالي</div><div class="ue-v">' + (ue.gross_margin || '—') + '</div></div>' +
      '</div>' +
    '</div>' : '';

  // ⑦b DataSaudi indicators
  const dsInds = (o.datasaudi_indicators || []);
  const dsSection = dsInds.length ?
    '<div class="det-sec"><div class="det-sec-title">🏛️ مؤشرات DataSaudi المرتبطة <span style="font-size:10px;font-weight:400;color:var(--faint)">مصدر رسمي</span></div>' +
      dsInds.map(d => {
        const sigCls = d.signal === 'إيجابي' ? 'ind-pos' : d.signal === 'فجوة' ? 'ind-gap' : 'ind-neg';
        const sigIcon = d.signal === 'إيجابي' ? '🏛️ ↑' : d.signal === 'فجوة' ? '🏛️ ◈' : '🏛️ →';
        return '<div class="ind-row">' +
          '<span class="' + sigCls + '">' + sigIcon + '</span>' +
          '<span style="flex:1;font-weight:600">' + (d.indicator || '') + '</span>' +
          '<span class="badge bb" style="font-size:10px">' + (d.value || '') + '</span>' +
          (d.detail ? '<span style="color:var(--muted);font-size:11px;flex:2">' + d.detail + '</span>' : '') +
        '</div>';
      }).join('') +
    '</div>' : '';

  // ⑧ Competitors — handle list or dict.local
  const compRaw = o.competitors;
  let compList = [];
  if (Array.isArray(compRaw)) compList = compRaw;
  else if (compRaw && Array.isArray(compRaw.local)) compList = compRaw.local;
  const compSection = compList.length ?
    '<div class="det-sec"><div class="det-sec-title">⑧ المنافسون المحليون <span style="font-size:10px;font-weight:400;color:var(--faint)">🔍 بحث ويب محقق</span></div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:7px">' +
        compList.map(c => '<span class="badge bo">🔍 ' + (typeof c === 'string' ? c : c.name || JSON.stringify(c)) + '</span>').join('') +
      '</div>' +
    '</div>' : '';

  // ⑨ Risk analysis
  const risks = (o.risk_analysis || []);
  const riskSection = risks.length ?
    '<div class="det-sec"><div class="det-sec-title">⑨ تحليل المخاطر</div>' +
      '<table style="width:100%;border-collapse:collapse;font-size:12px">' +
        '<thead><tr>' +
          '<th style="background:var(--bg);padding:8px;text-align:right;border:1px solid var(--border);font-weight:700;color:var(--muted)">المخاطرة</th>' +
          '<th style="background:var(--bg);padding:8px;text-align:center;border:1px solid var(--border);font-weight:700;color:var(--muted)">الاحتمالية</th>' +
          '<th style="background:var(--bg);padding:8px;text-align:center;border:1px solid var(--border);font-weight:700;color:var(--muted)">التأثير</th>' +
          '<th style="background:var(--bg);padding:8px;text-align:right;border:1px solid var(--border);font-weight:700;color:var(--muted)">خطة التخفيف</th>' +
        '</tr></thead><tbody>' +
        risks.map(r => {
          const probCls = r.probability === 'عالي' ? 'br' : r.probability === 'متوسط' ? 'by' : 'bg';
          const impCls  = r.impact     === 'عالي' ? 'br' : r.impact     === 'متوسط' ? 'by' : 'bg';
          const name = r.risk || r.type || '';
          return '<tr>' +
            '<td style="padding:8px;border:1px solid var(--border);font-weight:600">' + name + '</td>' +
            '<td style="padding:8px;border:1px solid var(--border);text-align:center"><span class="badge ' + probCls + '">' + (r.probability || '—') + '</span></td>' +
            '<td style="padding:8px;border:1px solid var(--border);text-align:center"><span class="badge ' + impCls  + '">' + (r.impact     || '—') + '</span></td>' +
            '<td style="padding:8px;border:1px solid var(--border);color:var(--muted)">' + (r.mitigation || '—') + '</td>' +
          '</tr>';
        }).join('') +
        '</tbody></table>' +
    '</div>' : '';

  // ⑩ Financial projections
  const fp = o.financial_projections || {};
  const fpYears = Object.keys(fp);
  const fpSection = fpYears.length ?
    '<div class="det-sec"><div class="det-sec-title">⑩ التوقعات المالية</div>' +
      '<table class="fp-tbl"><thead><tr>' +
        '<th>السنة</th><th style="color:var(--success)">متفائل</th><th>متوقع</th><th style="color:var(--muted)">متحفظ</th>' +
      '</tr></thead><tbody>' +
      fpYears.map(y => '<tr>' +
        '<td><strong>' + y + '</strong></td>' +
        '<td style="color:var(--success)">' + (fp[y]?.optimistic || '—') + '</td>' +
        '<td style="font-weight:700">' + (fp[y]?.expected    || '—') + '</td>' +
        '<td style="color:var(--muted)">' + (fp[y]?.conservative || '—') + '</td>' +
      '</tr>').join('') +
      '</tbody></table>' +
    '</div>' : '';

  // ⑪ Exit strategy
  const exit = o.exit_strategy || {};
  const exitSection = exit.primary ?
    '<div class="det-sec"><div class="det-sec-title">⑪ استراتيجية الخروج</div>' +
      '<div style="background:var(--bg);border-radius:var(--rsm);padding:14px;border:1px solid var(--border)">' +
        '<div style="font-size:13px;font-weight:700;margin-bottom:5px">🚀 ' + exit.primary + '</div>' +
        '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">⏱ الإطار الزمني: ' + (exit.timeline || '—') + '</div>' +
        (exit.potential_acquirers?.length ?
          '<div style="font-size:12px"><strong>مستحوذون محتملون:</strong> ' +
          exit.potential_acquirers.map(a => '<span class="badge bb" style="margin-left:4px">' + a + '</span>').join('') +
          '</div>' : '') +
      '</div>' +
    '</div>' : '';

  // ⑫ Roadmap
  const roadmapSection = (o.roadmap || []).length ?
    '<div class="det-sec"><div class="det-sec-title">⑫ خارطة الطريق</div>' +
      (o.roadmap || []).map((ph, i) =>
        '<div class="rm-phase">' +
          '<div class="rm-dot">' + (i + 1) + '</div>' +
          '<div class="rm-body">' +
            '<div class="rm-name">' + (ph.phase || '') + '</div>' +
            '<div class="rm-dur">' + (ph.duration || '') + '</div>' +
            (ph.tasks || []).map(t => '<div class="rm-task">' + t + '</div>').join('') +
          '</div>' +
        '</div>'
      ).join('') +
    '</div>' : '';

  // ⑬ First steps
  const stepsSection = (o.first_steps || []).length ?
    '<div class="det-sec"><div class="det-sec-title">⑬ الخطوات الأولى</div>' +
      '<ol style="padding-right:22px;font-size:13px;line-height:2.2;color:var(--muted)">' +
      o.first_steps.map(s => '<li>' + s + '</li>').join('') +
      '</ol>' +
    '</div>' : '';

  // ⑭ Close button (bottom)
  const closeBtn =
    '<div style="padding:20px;text-align:center;border-top:1px solid var(--border);margin-top:8px">' +
      '<button onclick="closeDetail()" style="padding:10px 32px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--bg);font-size:14px;font-weight:600;font-family:Tajawal,sans-serif;cursor:pointer;">✕ إغلاق</button>' +
    '</div>';

  // Extras: regulations + data confidence
  const regsSection = (o.regulations || []).length ?
    '<div class="det-sec"><div class="det-sec-title">المتطلبات التنظيمية</div>' +
      '<ol style="padding-right:20px;font-size:12px;line-height:2;color:var(--muted)">' +
      o.regulations.map(r => '<li>' + r + '</li>').join('') + '</ol>' +
    '</div>' : '';

  const confSection = o.data_confidence ?
    '<div class="det-sec"><div style="font-size:11px;color:var(--faint);text-align:center">📊 مستوى الثقة: ' + o.data_confidence + '</div></div>' : '';

  const sourceLegend =
    '<div class="det-sec" style="margin-top:4px">' +
      '<div style="background:var(--bg);border-radius:var(--rsm);padding:10px 14px;border:1px solid var(--border);display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:var(--muted)">' +
        '<span><strong>مصادر البيانات:</strong></span>' +
        '<span>🏛️ DataSaudi رسمي</span>' +
        '<span>🔍 بحث ويب محقق</span>' +
        '<span>📊 معادلة حسابية</span>' +
        '<span>⚙️ تقدير</span>' +
      '</div>' +
    '</div>';

  return hdr +
    '<div class="det-body">' +
      sanityHtml +
      scoreCompHtml +       // التعديل 12
      scoreSection +
      pss +
      tsmSection +
      ueSection +
      sensHtml +            // التعديل 14
      dsSection +
      compSection +
      risk7Html +           // التعديل 13
      scHtml +              // التعديل 15
      teamHtml +            // التعديل 16
      pstHtml +             // التعديل 17
      kpisHtml +            // التعديل 18
      fpSection +
      exitSection +
      roadmapSection +
      stepsSection +
      regsSection +
      confSection +
      sourceLegend +
    '</div>' +
    closeBtn;
}

function renderMicroDetail(m) {
  const costs = m.setup_costs_breakdown || {};

  return '<div class="det-hdr">' +
    '<div style="font-size:28px">' + (m._sec?.icon || '⚡') + '</div>' +
    '<div style="flex:1">' +
      '<div style="font-size:15px;font-weight:800;margin-bottom:3px">' + (m.name || '') + '</div>' +
      '<div style="font-size:12px;color:var(--muted)">مشتق من: ' + (m.derived_from || '') + ' · ' + (m.category || '') + '</div>' +
      '<div style="display:flex;gap:6px;margin-top:7px;flex-wrap:wrap">' +
        '<span class="badge by">' + (m.launch_speed || '') + '</span>' +
        '<span class="badge bo">' + (m.startup_cost || '') + '</span>' +
        ((() => { const rl = getMicroRiskLevel(m); return '<span class="badge ' + (rl === 'منخفض' ? 'bg' : rl === 'متوسط' ? 'by' : 'br') + '">' + rl + '</span>'; })()) +
      '</div>' +
    '</div>' +
    '<button class="det-close" onclick="closeDetail()">✕</button>' +
  '</div>' +

  '<div class="det-body">' +

  '<div class="det-sec"><div class="det-sec-title">المشكلة والحل</div>' +
  '<div style="background:#fff7ed;border-radius:var(--rsm);padding:11px;margin-bottom:8px;font-size:13px;border:1px solid #fed7aa"><strong>المشكلة:</strong> ' + (m.problem || '—') + '</div>' +
  '<div style="background:#f0fdf4;border-radius:var(--rsm);padding:11px;font-size:13px;border:1px solid #bbf7d0"><strong>الحل:</strong> ' + (m.solution || '—') + '</div>' +
  '</div>' +

  '<div class="det-sec"><div class="det-sec-title">الأرقام المالية</div>' +
  '<div class="ue">' +
  '<div class="ue-c"><div class="ue-l">التكلفة المبدئية</div><div class="ue-v" style="color:var(--primary)">' + (m.startup_cost || '—') + '</div></div>' +
  '<div class="ue-c"><div class="ue-l">الإيراد الشهري المتوقع</div><div class="ue-v" style="color:var(--success)">' + (m.monthly_revenue ? m.monthly_revenue.toLocaleString('ar-SA') + ' ر' : '—') + '</div></div>' +
  '<div class="ue-c"><div class="ue-l">التكاليف الشهرية</div><div class="ue-v">' + (m.monthly_costs ? m.monthly_costs.toLocaleString('ar-SA') + ' ر' : '—') + '</div></div>' +
  '<div class="ue-c"><div class="ue-l">نقطة التعادل</div><div class="ue-v">' + (m.break_even_months || '?') + ' أشهر</div></div>' +
  '</div>' +
  '</div>' +

  (Object.keys(costs).length ? '<div class="det-sec"><div class="det-sec-title">تفصيل تكاليف التأسيس</div>' +
    '<div style="display:flex;flex-direction:column;gap:6px">' +
    Object.entries(costs).map(([k, v]) => {
      const total = Object.values(costs).reduce((a, b) => a + (b || 0), 0);
      const pct = total > 0 ? ((v / total) * 100).toFixed(0) : 0;
      return '<div class="sbr"><span class="sbr-lbl">' + k.replace(/_/g, ' ') + '</span>' +
        '<div class="sbr-bar"><div class="sbr-fill" style="width:' + pct + '%;background:var(--micro)"></div></div>' +
        '<span class="sbr-sc" style="color:var(--micro)">' + fmtN(v) + ' ر</span>' +
      '</div>';
    }).join('') +
    '</div>' +
  '</div>' : '') +

  (m.how_to_start ? '<div class="det-sec"><div class="det-sec-title">كيف تبدأ بالضبط</div>' +
    '<div style="background:#eff6ff;border-radius:var(--rsm);padding:14px;font-size:13px;line-height:2;border:1px solid #bfdbfe">' + m.how_to_start + '</div>' +
  '</div>' : '') +

  (m.saudi_demand_proof ? '<div class="det-sec"><div class="det-sec-title">دليل الطلب من DataSaudi</div>' +
    '<div style="background:#f0fdf4;border-radius:var(--rsm);padding:12px;font-size:13px;border:1px solid #bbf7d0">' + m.saudi_demand_proof + '</div>' +
  '</div>' : '') +

  ((m.support_programs || []).length ? '<div class="det-sec"><div class="det-sec-title">برامج الدعم</div>' +
    '<table class="sup-tbl"><thead><tr><th>البرنامج</th><th>الجهة</th><th>الدعم</th><th>الأهلية</th></tr></thead><tbody>' +
    (m.support_programs || []).map(p => '<tr><td><strong>' + p.program + '</strong></td><td>' + p.body + '</td><td>' + p.benefit + '</td><td>' + p.eligibility + '</td></tr>').join('') +
    '</tbody></table>' +
  '</div>' : '') +

  (m.local_example ? '<div class="det-sec"><div class="det-sec-title">مثال محلي</div>' +
    '<div style="font-size:13px;color:var(--muted);background:var(--bg);border-radius:var(--rsm);padding:11px;border:1px solid var(--border)">💡 ' + m.local_example + '</div>' +
  '</div>' : '') +

  (m.realism_note ? '<div class="det-sec">' +
    '<div style="font-size:12px;color:' + (m.is_realistic ? 'var(--success)' : 'var(--warn)') + ';background:var(--bg);border-radius:var(--rsm);padding:11px;border:1px solid var(--border)">' +
    (m.is_realistic ? '✅' : '⚠️') + ' <strong>تقييم الواقعية:</strong> ' + m.realism_note + '</div>' +
  '</div>' : '') +

  // ━━ التعديل 19: مسارات التأسيس للفرص المصغّرة ━━
  (() => {
    const paths = m.paths || {};
    const pathDefs = [
      { id: 'freelancer', icon: '💻', name: 'فريلانسر / عمل حر' },
      { id: 'ecommerce',  icon: '🛒', name: 'تجارة إلكترونية' },
      { id: 'entity',     icon: '🏢', name: 'منشأة' },
    ];
    const hasAny = pathDefs.some(p => paths[p.id] && (paths[p.id].cost > 0 || paths[p.id].note));
    if (!hasAny && !Object.keys(paths).length) return '';
    return '<div class="det-sec"><div class="det-sec-title">⑲ مسارات التأسيس</div>' +
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">' +
      pathDefs.map(p => {
        const pd = paths[p.id] || {};
        return '<div style="background:var(--surface);border-radius:var(--r);border:2px solid var(--border);padding:14px;text-align:center">' +
          '<div style="font-size:24px;margin-bottom:6px">' + p.icon + '</div>' +
          '<div style="font-size:12px;font-weight:700;margin-bottom:5px">' + p.name + '</div>' +
          '<div style="font-size:13px;font-weight:800;color:var(--primary);margin-bottom:5px">' +
            (pd.cost > 0 ? fmtN(pd.cost) + ' ريال' : pd.cost === 0 ? 'مجاني' : '—') +
          '</div>' +
          (pd.note ? '<div style="font-size:11px;color:var(--muted);line-height:1.6">' + pd.note + '</div>' : '') +
        '</div>';
      }).join('') +
      '</div></div>';
  })() +

  '</div>';
}

// ══════════════════════════════════════════════
// State mutators
// ══════════════════════════════════════════════
function setTab(t)          { S.tab = t; S.sector = null; render(); }
function setSector(id)      { S.sector = id; render(); }
function setSearch(q)       { S.search = q; render(); }
function setRisk(f)         { S.risk = f; render(); }
function setVerdict(v)      { S.verdict = v; render(); }        // التعديل 2
function toggleSideHustle() { S.sideHustle = !S.sideHustle; render(); }  // التعديل 3
function setSortBy(s)       { S.sortBy = s; render(); }         // التعديل 4
function setMicroTab(t)     { S.microTab = t; render(); }
function setMicroPath(p)    { S.microPath = p; render(); }
function updateCalc(k, v)   { S.calc[k] = parseInt(v, 10); render(); }
function clearBookmarks()   { S.bookmarks = []; localStorage.removeItem('ycs_bm'); render(); }

// ══════════════════════════════════════════════
// Boot
// ══════════════════════════════════════════════
render();
</script>
</body>
</html>
